<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Ice Cream Menu</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; background-color: #fdf2f2; text-align: center; }
        header { background: linear-gradient(135deg, #e44d26, #f16529); color: white; padding: 25px 10px; }
        
        /* Filter Buttons Style */
        .filter-container { margin: 20px 0; display: flex; justify-content: center; flex-wrap: wrap; gap: 10px; padding: 0 10px; }
        .filter-btn { 
            padding: 10px 20px; border: 2px solid #e44d26; background: white; color: #e44d26; 
            border-radius: 25px; cursor: pointer; font-weight: bold; transition: 0.3s;
        }
        .filter-btn.active, .filter-btn:hover { background: #e44d26; color: white; }

        .menu-container { display: flex; flex-wrap: wrap; justify-content: center; padding: 10px; gap: 20px; }
        .menu-card { background: white; border-radius: 20px; width: 260px; box-shadow: 0 8px 15px rgba(0,0,0,0.08); overflow: hidden; border: 1px solid #eee; }
        .menu-card img { width: 100%; height: 180px; object-fit: cover; }
        .info { padding: 15px; }
        .brand-tag { font-size: 0.8em; color: #666; text-transform: uppercase; letter-spacing: 1px; }
        .price { color: #e44d26; font-weight: bold; font-size: 1.3em; margin-top: 5px; }
        #status-msg { margin-top: 30px; color: #666; }
    </style>
</head>
<body>

    <header>
        <h1>Our Digital Menu</h1>
        <p>Select your favorite brand below</p>
    </header>

    <div class="filter-container" id="filter-box">
        <button class="filter-btn active" onclick="filterMenu('All', this)">All Brands</button>
        </div>

    <div id="status-msg">Loading flavors...</div>
    <div class="menu-container" id="menu-box"></div>

    <script>
        const googleSheetUrl = "https://script.google.com/macros/s/AKfycbwS8NLxa9SP6KP0IFqUyzMztpcO6q0BzvtDXA0_MasxkeKPPKSbUK8O0iEQdHDZXIE/exec"; // यहाँ नया URL डालें
        let allItems = [];

        async function loadData() {
            try {
                const response = await fetch(googleSheetUrl);
                allItems = await response.json();
                createFilterButtons();
                renderMenu('All');
            } catch (error) {
                document.getElementById('status-msg').innerText = "Failed to load menu.";
            }
        }

        function createFilterButtons() {
            const filterBox = document.getElementById('filter-box');
            // उपलब्ध ब्रांड्स की यूनिक लिस्ट निकालें
            const brands = [...new Set(allItems.map(item => item.brand).filter(b => b))];
            
            brands.forEach(brand => {
                const btn = document.createElement('button');
                btn.className = 'filter-btn';
                btn.innerText = brand;
                btn.onclick = (e) => filterMenu(brand, e.target);
                filterBox.appendChild(btn);
            });
        }

        function filterMenu(brand, btnElement) {
            // बटन का कलर बदलें
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active');
            renderMenu(brand);
        }

        function renderMenu(filter) {
            const menuBox = document.getElementById('menu-box');
            const statusMsg = document.getElementById('status-msg');
            menuBox.innerHTML = '';
            statusMsg.style.display = 'none';

            const filteredItems = allItems.filter(item => {
                const isAvailable = String(item.available).toLowerCase() === 'yes';
                const matchesBrand = (filter === 'All' || item.brand === filter);
                return isAvailable && matchesBrand;
            });

            if (filteredItems.length === 0) {
                statusMsg.style.display = 'block';
                statusMsg.innerText = "No items available for this selection.";
                return;
            }

            filteredItems.forEach(item => {
                menuBox.innerHTML += `
                    <div class="menu-card">
                        <img src="${item.img || 'https://via.placeholder.com/260x180'}" onerror="this.src='https://via.placeholder.com/260x180'">
                        <div class="info">
                            <div class="brand-tag">${item.brand}</div>
                            <h3>${item.name}</h3>
                            <div class="price">₹${item.price}</div>
                        </div>
                    </div>
                `;
            });
        }

        window.onload = loadData;
    </script>
</body>
</html>
