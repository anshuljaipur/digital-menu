<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, shrink-to-fit=no, viewport-fit=cover">
    <title>Glacier Ice Cream - Digital Menu</title>
    
    <link rel="icon" type="image/jpeg" href="https://i.postimg.cc/DfWgmYTD/favicon.jpg"> 

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@800&family=Poppins:wght@400;500;600;700;800&display=swap');

        :root {
            --primary-color: #e44d26;
            --glacier-blue: #1f51c6; 
            --active-brand-red: #e74c3c;
            --bg-color: #ffffff;
            --main-bg: #f8f9fc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --chip-bg: #f1f5f9;
            --hover-bg: #f8faff;
            --input-bg: transparent;
            --overlay-bg: rgba(15, 23, 42, 0.7);
        }

        [data-theme="dark"] {
            --bg-color: #0f172a;
            --main-bg: #020617;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #334155;
            --chip-bg: #0f172a;
            --hover-bg: #334155;
            --input-bg: #0f172a;
            --overlay-bg: rgba(0, 0, 0, 0.8);
        }

        * { box-sizing: border-box; touch-action: manipulation; } 
        html { -webkit-text-size-adjust: 100%; width: 100%; height: 100%; } 
        
        html, body { 
            margin: 0; padding: 0; 
            width: 100%; max-width: 100%; 
            height: 100%; height: 100dvh; 
            overflow: hidden !important; 
            overscroll-behavior: none; 
            background-color: var(--bg-color); color: var(--text-main); 
            font-family: 'Poppins', sans-serif; 
            display: flex; flex-direction: column; 
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            transition: background-color 0.3s ease, color 0.3s ease;
        }
        
        input, select, textarea { font-size: 16px !important; max-width: 100%; }
        select option { background-color: var(--card-bg); color: var(--text-main); }
        img { -webkit-user-drag: none; user-drag: none; pointer-events: none; }
        
        .skeleton-bg { background: linear-gradient(90deg, var(--chip-bg) 25%, var(--border-color) 50%, var(--chip-bg) 75%) !important; background-size: 200% 100% !important; animation: shimmer 1.5s infinite linear !important; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        #splash-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100dvh; background: linear-gradient(135deg, var(--glacier-blue), #1a42a4); z-index: 999999; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.5s ease, visibility 0.5s ease; }
        .splash-content { text-align: center; color: white; }
        .splash-icon { font-size: 5em; animation: bounce-scoop 0.8s infinite alternate cubic-bezier(0.4, 0, 0.2, 1); margin-bottom: 15px; }
        .splash-title { font-family: 'Montserrat', sans-serif; font-size: 2.2em; font-weight: 800; letter-spacing: 1px; margin: 0; text-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .splash-subtext { font-size: 0.9em; opacity: 0.8; font-weight: 500; margin-top: 10px; animation: pulse-text 1.5s infinite; }
        @keyframes bounce-scoop { 0% { transform: translateY(0) scale(1); } 100% { transform: translateY(-25px) scale(1.05); } }
        @keyframes pulse-text { 0% { opacity: 0.4; } 50% { opacity: 1; } 100% { opacity: 0.4; } }

        #loading-bar { position: fixed; top: 0; left: 0; height: 4px; background-color: var(--glacier-blue); width: 0%; z-index: 9999; transition: width 0.3s ease, opacity 0.5s ease; box-shadow: 0 2px 5px rgba(31,81,198, 0.5); }

        header { background: var(--card-bg); padding: 12px 25px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; z-index: 100; flex-shrink: 0; height: 65px; box-sizing: border-box; width: 100%;}
        .header-logo { height: 45px; width: auto; object-fit: contain; }
        .header-actions { display: flex; gap: 10px; align-items: center; }
        .action-btn { font-family: 'Poppins', sans-serif; border: 1px solid var(--border-color); padding: 8px 14px; border-radius: 50px; font-weight: 600; font-size: 0.85em; cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 6px; background: var(--card-bg); color: var(--text-main); }
        .action-btn:hover { background: var(--hover-bg); border-color: var(--glacier-blue); }
        .btn-profile { background: rgba(228, 77, 38, 0.1); color: var(--primary-color); border-color: rgba(228, 77, 38, 0.2); }
        .btn-profile:hover { background: var(--primary-color); color: white; }

        .landscape-search-sort { display: none; }

        .top-nav-bar { display: flex; width: 100%; background: var(--card-bg); border-bottom: 1px solid var(--border-color); z-index: 9; flex-shrink: 0; transition: 0.3s; }
        .brands-wrapper { flex: 1; min-width: 0; display: flex; align-items: center; position: relative; transition: height 0.3s ease, opacity 0.3s ease, border 0.3s ease;}
        .brands-row { width: 100%; display: flex; justify-content: flex-start; overflow-x: auto; padding: 15px 20px; gap: 25px; scrollbar-width: none; box-sizing: border-box; scroll-behavior: smooth;}
        .brands-row::-webkit-scrollbar { display: none; }
        
        .search-sort-side { display: flex; flex-direction: column; width: 320px; padding: 10px 20px; gap: 8px; border-left: 1px solid var(--border-color); justify-content: center; }
        .search-sort-side .control-chip { padding: 6px 15px; margin: 0; min-width: auto; flex: 1;}

        .brand-arrow { 
            position: absolute; top: 15px; z-index: 10; 
            background: rgba(31, 81, 198, 0.9); backdrop-filter: blur(4px); 
            border: 1px solid rgba(255,255,255,0.2); box-shadow: 0 4px 12px rgba(31,81,198,0.3); 
            width: 40px; height: 65px; display: none; flex-direction: column; justify-content: center; align-items: center !important;
            cursor: pointer; color: #ffffff; padding: 0; transition: 0.2s;
        }
        .left-arrow { left: 0; border-radius: 0 16px 16px 0; }
        .right-arrow { right: 0; border-radius: 16px 0 0 16px; }
        .arrow-icon { font-size: 1.4em; font-weight: 900; } 
        .arrow-count { font-size: 0.7em; font-weight: 800; color: #ffffff; margin-top: 2px; }

        .brand-item { display: flex; flex-direction: column; align-items: center; cursor: pointer; transition: 0.2s; flex-shrink: 0; } 
        .brand-icon { width: 65px; height: 65px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 2px solid var(--border-color); transition: 0.2s; background: #fff; padding: 5px; box-sizing: border-box; }
        .brand-icon img { width: 100%; height: 100%; object-fit: contain; border-radius: 50%; transform: scale(0.9); } 
        .brand-name { font-size: 0.6em; font-weight: 700; color: var(--text-muted); text-align: center; margin-top: 8px; white-space: nowrap; text-transform: uppercase; letter-spacing: 0.5px; }
        .brand-item.active .brand-icon { border-color: var(--active-brand-red); box-shadow: 0 4px 10px rgba(231, 76, 60, 0.15); }

        .main-layout { display: flex; flex: 1; overflow: hidden; background: var(--main-bg); width: 100%; box-sizing: border-box; }
        .sidebar { width: 240px; background: var(--card-bg); display: flex; flex-direction: column; overflow-y: auto; padding: 20px 15px; gap: 8px; scrollbar-width: none; border-right: 1px solid var(--border-color); flex-shrink: 0; box-sizing: border-box; }
        .cat-item { display: flex; align-items: center; cursor: pointer; transition: 0.2s; padding: 10px 15px; border-radius: 50px; gap: 12px; color: var(--text-main);}
        .cat-icon { font-size: 1.4em; display: flex; align-items: center; justify-content: center; width: 35px; height: 35px; }
        .cat-name { font-size: 0.85em; font-weight: 500; white-space: nowrap; }
        .cat-item.active { background: rgba(31,81,198,0.1); }
        .cat-item.active .cat-name { color: var(--glacier-blue); font-weight: 700; }

        .content-area { flex: 1; display: flex; flex-direction: column; overflow-y: auto; padding: 0px 30px 20px 30px; scroll-behavior: smooth; position: relative; width: 100%; }
        .controls-bar { position: sticky; top: 0; z-index: 50; background: var(--main-bg); display: flex; flex-direction: column; gap: 10px; margin: 0px -30px 15px -30px; padding: 15px 30px 5px 30px; transition: top 0.3s; width: calc(100% + 60px); }
        .control-chip { display: flex; align-items: center; background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 50px; padding: 10px 20px; flex: 1; transition: 0.2s;}
        .control-chip input, .control-chip select { border: none; outline: none; background: transparent; font-family: inherit; font-size: 0.9em; width: 100%; color: var(--text-main); margin-left: 8px;}

        .tags-container { display: flex; gap: 8px; overflow-x: auto; padding: 5px 0 10px 0; scrollbar-width: none; width: 100%; }
        .filter-tag-chip { padding: 8px 16px; background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 50px; font-size: 0.75em; font-weight: 600; color: var(--text-muted); cursor: pointer; white-space: nowrap; transition: 0.2s; flex-shrink: 0; }
        .filter-tag-chip.active { background: var(--glacier-blue); color: #fff; border-color: var(--glacier-blue); }

        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 2px solid var(--border-color); padding-bottom: 10px; width: 100%; }
        .section-header h2 { margin: 0; font-size: 1.4em; font-weight: 800; color: var(--text-main); }

        .menu-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; padding-bottom: 40px; width: 100%;}
        .menu-card { background: var(--card-bg); border-radius: 16px; border: 1px solid var(--border-color); display: flex; flex-direction: column; position: relative; padding: 15px; transition: transform 0.2s; height: 100%;}
        .card-img-wrapper { position: relative; background: #fff; border-radius: 12px; height: 160px; display: flex; align-items: center; justify-content: center; margin-bottom: 15px; cursor: pointer; overflow: hidden;}
        .card-img-wrapper img { width: 90%; height: 90%; object-fit: contain; }
        
        .item-name { font-size: 1em; font-weight: 700; color: var(--text-main); margin: 0 0 6px 0; line-height: 1.3; min-height: 40px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .item-volume { font-size: 0.8em; color: var(--text-muted); margin-bottom: 15px; }
        .item-price { font-size: 1.2em; font-weight: 800; color: var(--text-main); }
        .item-mrp { font-size: 0.85em; font-weight: 500; color: var(--text-muted); text-decoration: line-through; margin-left: 5px; }

        .btn-container { position: absolute; right: 15px; bottom: 15px; z-index: 4; }
        .app-add-btn { width: 36px; height: 36px; border-radius: 50%; background: var(--card-bg); color: var(--glacier-blue); border: 1px solid var(--border-color); font-size: 1.5em; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .app-qty-control { height: 36px; width: 90px; background: var(--card-bg); border-radius: 50px; border: 1px solid var(--glacier-blue); display: flex; align-items: center; justify-content: space-between; padding: 0 8px; font-weight: 700; color: var(--glacier-blue); }
        .app-qty-control button { background: none; border: none; color: var(--glacier-blue); font-weight: bold; font-size: 1.2em; cursor: pointer; }

        /* 🟢 UPDATED PRODUCT DETAIL MODAL CSS 🟢 */
        .pd-detail-section { margin-bottom: 20px; padding: 12px; background: var(--chip-bg); border-radius: 12px; display: none; }
        .pd-detail-title { margin: 0 0 5px 0; font-size: 0.75em; font-weight: 800; color: var(--glacier-blue); text-transform: uppercase; letter-spacing: 1px;}
        .pd-detail-text { margin: 0; font-size: 0.85em; color: var(--text-main); line-height: 1.6; }

        #bottom-cart-banner { position: fixed; bottom: -100px; left: 50%; transform: translateX(-50%); width: calc(100% - 40px); max-width: 600px; background: var(--glacier-blue); color: white; padding: 16px 25px; border-radius: 16px; display: flex; justify-content: space-between; align-items: center; font-weight: bold; box-shadow: 0 10px 25px rgba(0,0,0,0.3); z-index: 1000; transition: bottom 0.4s; cursor: pointer; }
        #bottom-cart-banner.visible { bottom: calc(20px + env(safe-area-inset-bottom)); }

        .floating-action-container { position: fixed; bottom: 85px; right: 20px; display: flex; flex-direction: column; gap: 10px; z-index: 999; }
        .floating-btn { background: var(--glacier-blue); color: white; width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 15px rgba(31,81,198,0.4); cursor: pointer; border: none; }

        @media (max-width: 999px) {
            header { padding: 10px 15px; height: 55px; }
            .header-logo { height: 35px; }
            .hide-mobile-text { display: none; }
            .top-nav-bar { flex-direction: column; width: 100%; }
            .brands-wrapper { border-bottom: 1px solid var(--border-color); width: 100%; max-height: 120px; transition: max-height 0.4s, opacity 0.3s; }
            .main-layout { flex-direction: row; width: 100%; }
            .sidebar { position: fixed; top: 65px; left: -100%; height: calc(100dvh - 65px); width: 100px; z-index: 900; transition: left 0.3s; }
            .sidebar.mobile-open { left: 0; }
            .content-area { width: 100%; padding: 0 10px 10px 10px; }
            .controls-bar { width: calc(100% + 20px); margin: 0 -10px 10px -10px; padding: 15px 12px 5px 12px; border-bottom: 1px solid var(--border-color); }
            .menu-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
            #mobile-cat-toggle { display: flex; position: fixed; top: 50%; left: env(safe-area-inset-left); transform: translateY(-50%); background: var(--glacier-blue); color: white; border: none; padding: 25px 8px; border-radius: 0 12px 12px 0; z-index: 999; }
        }

        @media (max-width: 999px) and (orientation: landscape) {
            header { height: 50px; padding: 5px 15px; }
            .landscape-search-sort { display: flex; flex: 1; align-items: center; gap: 10px; margin: 0 15px; }
            .landscape-search-sort .control-chip { max-width: 200px; height: 32px; padding: 0 12px; }
            .brands-wrapper { margin-left: 80px; width: calc(100% - 200px) !important; }
            .hidden-landscape { max-height: 0 !important; opacity: 0 !important; }
            .sidebar { position: fixed !important; top: 50px !important; left: 0 !important; width: 80px !important; height: calc(100dvh - 50px) !important; display: flex !important; box-shadow: none !important; }
            .main-layout { margin-left: 80px; width: calc(100% - 80px - 120px); }
            .tags-sidebar-landscape { display: flex !important; position: fixed; right: 0; top: 50px; width: 120px; height: calc(100dvh - 50px); background: var(--card-bg); border-left: 1px solid var(--border-color); flex-direction: column; overflow-y: auto; padding: 10px 5px; gap: 8px; z-index: 100; }
            .menu-grid { grid-template-columns: repeat(3, 1fr) !important; gap: 8px !important; }
            #bottom-cart-banner { width: calc(100% - 220px); left: calc(80px + 10px); transform: none; }
        }
    </style>
</head>
<body>

    <div id="splash-screen">
        <div class="splash-content">
            <div class="splash-icon">🍦</div>
            <h1 class="splash-title">Glacier</h1>
            <div class="splash-subtext">Stocking the freezer...</div>
        </div>
    </div>

    <div id="loading-bar"></div>

    <header>
        <img src="https://i.postimg.cc/c4MX4XyQ/logo-glacier.png" alt="Glacier Logo" class="header-logo">
        <div class="landscape-search-sort">
            <div class="control-chip">🔍 <input type="text" id="search-bar-landscape" onkeyup="syncInputs('landscape')"></div>
            <div class="control-chip">↕️ <select id="sort-dropdown-landscape" onchange="syncInputs('landscape')"><option value="default">Sort</option><option value="low-high">₹ Low-High</option><option value="high-low">₹ High-Low</option></select></div>
        </div>
        <div class="header-actions">
            <button class="action-btn" onclick="cycleTheme()" id="theme-toggle-btn">🖥️</button>
            <button class="action-btn btn-profile" onclick="handleProfileClick()" id="nav-profile-btn">👤 <span class="hide-mobile-text" id="nav-profile-text">Login</span></button>
            <button class="action-btn" onclick="shareWebsite()">📤</button>
        </div>
    </header>

    <div class="top-nav-bar">
        <div class="brands-wrapper">
            <button class="brand-arrow left-arrow" onclick="scrollBrands(-1)"><span class="arrow-icon">❮</span></button>
            <div class="brands-row" id="brands-sidebar" onscroll="updateBrandArrows()"></div>
            <button class="brand-arrow right-arrow" onclick="scrollBrands(1)"><span class="arrow-icon">❯</span></button>
        </div>
        <div class="search-sort-side" id="desktop-search-sort">
            <div class="control-chip">🔍 <input type="text" id="search-bar-desktop" placeholder="Search..." onkeyup="syncInputs('desktop')"></div>
            <div class="control-chip">↕️ <select id="sort-dropdown-desktop" onchange="syncInputs('desktop')"><option value="default">Sort by relevance</option><option value="low-high">Price: Low to High</option><option value="high-low">Price: High to Low</option></select></div>
        </div>
    </div>

    <div id="sidebar-overlay" onclick="toggleMobileCategory()"></div>

    <div class="main-layout">
        <aside class="sidebar" id="category-sidebar"></aside>
        <main class="content-area" id="products-area">
            <div class="controls-bar">
                <div class="search-sort-wrapper" id="mobile-search-sort">
                    <div class="control-chip">🔍 <input type="text" id="search-bar-mobile" placeholder="Search..." onkeyup="syncInputs('mobile')"></div>
                </div>
                <div class="tags-container" id="tags-container-portrait"></div>
            </div>
            <div class="section-header">
                <h2 id="current-category-title">Menu</h2>
                <span id="item-count">0 items</span>
            </div>
            <div id="status-msg" style="display:none; text-align:center; padding:50px;">Loading...</div>
            <div class="menu-grid" id="main-menu-grid"></div>
            <div class="legal-footer" style="padding:40px 0; font-size:0.7em; color:var(--text-muted); text-align:center;">
                <p>© 2026 Glacier Ice Cream. All rights reserved.</p>
            </div>
        </main>
    </div>

    <aside class="tags-sidebar-landscape" id="tags-container-landscape"></aside>
    <button id="mobile-cat-toggle" onclick="toggleMobileCategory()">❯</button>

    <div id="bottom-cart-banner" onclick="toggleCart()">
        <div><span id="banner-qty">0 ITEMS</span> | ₹<span id="banner-total">0</span></div>
        <div>View Cart ➔</div>
    </div>

    <div class="floating-action-container">
        <button class="floating-btn" onclick="document.getElementById('products-area').scrollTo({top:0, behavior:'smooth'})">↑</button>
    </div>

    <div id="product-detail-modal" class="custom-modal" onclick="closeProductDetailModal()">
        <div class="modal-content-box" onclick="event.stopPropagation()">
            <div style="display:flex; justify-content:flex-end;"><span style="cursor:pointer; font-size:1.5em;" onclick="closeProductDetailModal()">×</span></div>
            <img id="pd-modal-img" src="" style="width:100%; height:200px; object-fit:contain; margin-bottom:15px;">
            <h2 id="pd-modal-name" style="margin:0;"></h2>
            <p id="pd-modal-volume" style="color:var(--text-muted); margin-bottom:15px;"></p>
            
            <div id="pd-modal-desc-wrap" class="pd-detail-section">
                <h4 class="pd-detail-title">Description</h4>
                <p id="pd-modal-desc" class="pd-detail-text"></p>
            </div>
            
            <div id="pd-modal-ing-wrap" class="pd-detail-section">
                <h4 class="pd-detail-title">Ingredients</h4>
                <p id="pd-modal-ingredients" class="pd-detail-text"></p>
            </div>

            <div class="pd-bottom-row">
                <div id="pd-modal-price-wrap"></div>
                <div id="pd-modal-btn-wrap"></div>
            </div>
        </div>
    </div>

    <div id="cart-modal" class="custom-modal" onclick="toggleCart()"><div class="modal-content-box" onclick="event.stopPropagation()"><h2 style="border-bottom:1px solid var(--border-color); padding-bottom:10px;">Cart</h2><div id="cart-items-list"></div><div style="text-align:right; font-weight:800; font-size:1.2em; margin-top:15px;">Total: ₹<span id="cart-total-price">0</span></div><button onclick="checkout('whatsapp')" style="width:100%; background:#10b981; color:white; border:none; padding:15px; border-radius:12px; font-weight:800; margin-top:15px; cursor:pointer;">Order on WhatsApp</button></div></div>
    <div id="auth-modal" class="custom-modal" onclick="closeAuthModal()"><div class="modal-content-box" onclick="event.stopPropagation()"><h2>Login</h2><input type="number" id="phone-number" placeholder="Mobile Number" style="width:100%; padding:15px; margin-bottom:10px; border:1px solid var(--border-color); border-radius:10px;"><div id="recaptcha-container"></div><button id="send-otp-btn" onclick="sendOTP()" style="width:100%; background:var(--glacier-blue); color:white; border:none; padding:15px; border-radius:10px; font-weight:700; cursor:pointer;">Send OTP</button><div id="otp-input-section" style="display:none; margin-top:15px;"><input type="number" id="otp-code" placeholder="Enter OTP" style="width:100%; padding:15px; margin-bottom:10px; border:1px solid var(--border-color); border-radius:10px;"><button onclick="verifyOTP()" style="width:100%; background:var(--glacier-blue); color:white; border:none; padding:15px; border-radius:10px; font-weight:700; cursor:pointer;">Verify & Login</button></div><div id="auth-error" style="color:red; font-size:0.8em; margin-top:10px;"></div></div></div>

    <script>
        const googleSheetUrl = "https://script.google.com/macros/s/AKfycbwq17hSzF9mgPqqKw8FDVWFktoxpugpZNKYRjc6hmTSOKxQm4fY2jC1talNoEpMdDQ/exec"; 
        const WHATSAPP_NUMBER = "919829610570"; 
        
        let allItems = []; let currentCategory = 'All Items'; let currentBrand = 'All Brands'; let currentTagFilter = 'All'; let cart = {}; 

        let currentTheme = localStorage.getItem('glacier_theme') || 'auto';
        function applyTheme(theme) {
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            if (theme === 'dark' || (theme === 'auto' && prefersDark)) document.documentElement.setAttribute('data-theme', 'dark');
            else document.documentElement.removeAttribute('data-theme');
        }
        function cycleTheme() {
            if(currentTheme === 'light') currentTheme = 'dark'; else if(currentTheme === 'dark') currentTheme = 'auto'; else currentTheme = 'light';
            localStorage.setItem('glacier_theme', currentTheme); applyTheme(currentTheme);
        }
        applyTheme(currentTheme);

        window.addEventListener('orientationchange', () => {
            setTimeout(() => { window.scrollTo(0, 0); updateBrandArrows(); }, 100);
        });

        let lastScrollY = 0;
        document.getElementById('products-area').addEventListener('scroll', function() {
            const brandsWrapper = document.querySelector('.brands-wrapper');
            const controlsBar = document.querySelector('.controls-bar');
            let isLandscape = window.matchMedia("(orientation: landscape)").matches;
            let currentScrollY = this.scrollTop;
            
            if (currentScrollY > 60) {
                if (currentScrollY > lastScrollY) {
                    if (isLandscape) brandsWrapper.classList.add('hidden-landscape');
                    else controlsBar.style.top = '-160px'; 
                } else {
                    if (isLandscape) brandsWrapper.classList.remove('hidden-landscape');
                    else controlsBar.style.top = '0';
                }
            }
            lastScrollY = currentScrollY;
        });

        function toggleMobileCategory() {
            if(window.innerWidth > 999 || window.matchMedia("(orientation: landscape)").matches) return;
            const sidebar = document.getElementById('category-sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            sidebar.classList.toggle('mobile-open');
            overlay.classList.toggle('visible');
        }

        function syncInputs(source) {
            const searchVal = document.getElementById(`search-bar-${source}`).value;
            ['desktop', 'mobile', 'landscape'].forEach(env => {
                const el = document.getElementById(`search-bar-${env}`);
                if(el && env !== source) el.value = searchVal;
            });
            applyFilters();
        }

        async function loadData() {
            try {
                const response = await fetch(googleSheetUrl + "?t=" + Date.now());
                allItems = await response.json();
                setupUI();
                applyFilters();
                document.getElementById('splash-screen').style.opacity = '0';
                setTimeout(() => document.getElementById('splash-screen').remove(), 600);
            } catch (e) { console.error(e); }
        }

        function setupUI() {
            const sidebar = document.getElementById('category-sidebar');
            const uniqueCats = [...new Set(allItems.map(i => i.category).filter(c => c))];
            ['All Items', ...uniqueCats].forEach(cat => {
                const div = document.createElement('div'); div.className = 'cat-item';
                div.onclick = () => { currentCategory = cat; applyFilters(); document.getElementById('products-area').scrollTop=0; toggleMobileCategory(); };
                div.innerHTML = `<div class="cat-icon">🍨</div><div class="cat-name">${cat}</div>`;
                sidebar.appendChild(div);
            });

            const brandRow = document.getElementById('brands-sidebar');
            const uniqueBrands = [...new Set(allItems.map(i => i.brand).filter(b => b))];
            ['All Brands', ...uniqueBrands].forEach(brand => {
                const div = document.createElement('div'); div.className = 'brand-item';
                div.onclick = () => { currentBrand = brand; applyFilters(); document.getElementById('products-area').scrollTop=0; };
                div.innerHTML = `<div class="brand-icon"><b>${brand[0]}</b></div><div class="brand-name">${brand}</div>`;
                brandRow.appendChild(div);
            });

            const tags = [...new Set(allItems.flatMap(i => (i.tags||'').split(',').map(t => t.trim())).filter(t => t))];
            let tagsHTML = `<div class="filter-tag-chip active" onclick="setTagFilter('All')">All</div>`;
            tags.forEach(t => { tagsHTML += `<div class="filter-tag-chip" onclick="setTagFilter('${t}')">${t}</div>`; });
            document.getElementById('tags-container-portrait').innerHTML = tagsHTML;
            document.getElementById('tags-container-landscape').innerHTML = tagsHTML;
        }

        function setTagFilter(t) {
            currentTagFilter = t;
            document.querySelectorAll('.filter-tag-chip').forEach(btn => {
                btn.classList.toggle('active', btn.innerText.includes(t));
            });
            applyFilters();
        }

        function applyFilters() {
            const term = document.getElementById('search-bar-desktop').value.toLowerCase();
            const filtered = allItems.filter(i => {
                const matchesSearch = i.name.toLowerCase().includes(term);
                const matchesBrand = currentBrand === 'All Brands' || i.brand === currentBrand;
                const matchesCat = currentCategory === 'All Items' || i.category === currentCategory;
                const matchesTag = currentTagFilter === 'All' || (i.tags||'').includes(currentTagFilter);
                return matchesSearch && matchesBrand && matchesCat && matchesTag && i.available === "Yes";
            });

            let html = '';
            filtered.forEach(i => {
                const safeName = i.name.replace(/'/g, "\\'");
                html += `
                    <div class="menu-card" onclick="openProductDetail('${safeName}')">
                        <div class="card-img-wrapper"><img src="${i.img}"></div>
                        <div class="item-name">${i.name}</div>
                        <div class="item-price">₹${i.price} ${i.mrp ? `<span class="item-mrp">₹${i.mrp}</span>`:''}</div>
                        <div class="btn-container" onclick="event.stopPropagation()">
                            ${cart[i.name] ? 
                                `<div class="app-qty-control"><button onclick="changeQty('${safeName}',-1)">-</button><span>${cart[i.name].qty}</span><button onclick="changeQty('${safeName}',1)">+</button></div>` :
                                `<div class="app-add-btn" onclick="addToCart('${safeName}',${i.price})">+</div>`
                            }
                        </div>
                    </div>
                `;
            });
            document.getElementById('main-menu-grid').innerHTML = html;
            document.getElementById('item-count').innerText = filtered.length + " items";
        }

        window.openProductDetail = (name) => {
            const i = allItems.find(item => item.name === name);
            if(!i) return;
            document.getElementById('pd-modal-img').src = i.img;
            document.getElementById('pd-modal-name').innerText = i.name;
            
            // 🟢 ROBUST MATCHING FOR DESCRIPTION & INGREDIENTS 🟢
            const desc = i.description || i.Description || '';
            const ing = i.ingredients || i.Ingredients || '';
            
            const dWrap = document.getElementById('pd-modal-desc-wrap');
            const iWrap = document.getElementById('pd-modal-ing-wrap');
            
            if(desc.trim()) { 
                document.getElementById('pd-modal-desc').innerText = desc; 
                dWrap.style.display = 'block'; 
            } else dWrap.style.display = 'none';

            if(ing.trim()) { 
                document.getElementById('pd-modal-ingredients').innerText = ing; 
                iWrap.style.display = 'block'; 
            } else iWrap.style.display = 'none';

            document.getElementById('pd-modal-price-wrap').innerHTML = `<span class="item-price">₹${i.price}</span>`;
            document.getElementById('product-detail-modal').style.display = 'flex';
        }

        function closeProductDetailModal() { document.getElementById('product-detail-modal').style.display = 'none'; }

        function addToCart(name, price) {
            cart[name] = { price, qty: 1 };
            updateCartUI();
        }

        function changeQty(name, delta) {
            if(!cart[name]) return;
            cart[name].qty += delta;
            if(cart[name].qty <= 0) delete cart[name];
            updateCartUI();
        }

        function updateCartUI() {
            let total = 0, qty = 0;
            for(let key in cart) {
                total += (cart[key].price * cart[key].qty);
                qty += cart[key].qty;
            }
            document.getElementById('banner-qty').innerText = qty + " ITEMS";
            document.getElementById('banner-total').innerText = total;
            document.getElementById('cart-total-price').innerText = total;
            document.getElementById('bottom-cart-banner').classList.toggle('visible', qty > 0);
            applyFilters();
        }

        window.onload = loadData;
        function toggleCart() { const m = document.getElementById('cart-modal'); m.style.display = m.style.display === 'flex' ? 'none' : 'flex'; }
        function checkout(m) {
            let msg = "Order Details:\n";
            for(let key in cart) msg += `- ${key} x ${cart[key].qty}\n`;
            window.location.href = `https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(msg)}`;
        }
    </script>
</body>
</html>
