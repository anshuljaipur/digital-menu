<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Inventory Menu</title>
    <style>
        /* Clean and Modern Design */
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; background-color: #fdf2f2; text-align: center; color: #333; }
        header { background: linear-gradient(135deg, #e44d26, #f16529); color: white; padding: 30px 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; }
        header h1 { margin: 0; font-size: 2.2em; text-transform: uppercase; letter-spacing: 1px; }
        header p { margin: 10px 0 0; opacity: 0.9; font-size: 1.1em; }

        .menu-container { display: flex; flex-wrap: wrap; justify-content: center; padding: 10px; gap: 20px; min-height: 300px; }
        
        /* Card Styling */
        .menu-card { 
            background: white; 
            border-radius: 20px; 
            width: 280px; 
            box-shadow: 0 8px 15px rgba(0,0,0,0.08); 
            overflow: hidden; 
            transition: transform 0.3s ease;
            border: 1px solid #eee;
        }
        .menu-card:hover { transform: translateY(-8px); }
        .menu-card img { width: 100%; height: 200px; object-fit: cover; background: #eee; }
        
        .info { padding: 15px; }
        .info h3 { margin: 5px 0; font-size: 1.5em; color: #222; }
        .price { color: #e44d26; font-weight: bold; font-size: 1.4em; margin-top: 10px; }

        /* Status and Refresh Button */
        #status-msg { margin-top: 50px; font-size: 1.2em; color: #666; padding: 20px; }
        .refresh-btn { background: #e44d26; color: white; border: none; padding: 12px 25px; border-radius: 25px; cursor: pointer; font-size: 1em; margin-bottom: 20px; font-weight: bold; transition: background 0.3s; }
        .refresh-btn:hover { background: #c53a1a; }
    </style>
</head>
<body>

    <header>
        <h1>Our Digital Menu</h1>
        <p>Fresh & Available Flavors</p>
    </header>

    <button class="refresh-btn" onclick="loadMenu()">🔄 Refresh Menu</button>

    <div id="status-msg">Loading menu, please wait...</div>
    <div class="menu-container" id="menu-box"></div>

    <script>
        // *** PASTE YOUR GOOGLE APPS SCRIPT URL BELOW ***
        const googleSheetUrl = "https://script.google.com/macros/s/AKfycbyDq-o7EtorF4-P-Pi-c28NnboDLGuv4i4_eytMXXiE8JobpVf2ROowu-JExYzzWDU/exec"; 

        async function loadMenu() {
            const menuBox = document.getElementById('menu-box');
            const statusMsg = document.getElementById('status-msg');
            
            statusMsg.style.display = 'block';
            statusMsg.innerText = "Checking latest stock...";
            menuBox.innerHTML = ''; 

            try {
                const response = await fetch(googleSheetUrl);
                const data = await response.json();
                
                if (!data || data.length === 0) {
                    statusMsg.innerText = "No items found in the menu.";
                    return;
                }

                statusMsg.style.display = 'none'; 

                data.forEach(item => {
                    // Availability Check: Matches 'Yes' (case insensitive) or true boolean
                    const isAvailable = String(item.available).toLowerCase() === 'yes' || item.available === true;
                    
                    if (isAvailable) {
                        menuBox.innerHTML += `
                            <div class="menu-card">
                                <img src="${item.img || 'https://via.placeholder.com/280x200?text=No+Image'}" 
                                     alt="${item.name}" 
                                     onerror="this.src='https://via.placeholder.com/280x200?text=Ice+Cream'">
                                <div class="info">
                                    <h3>${item.name}</h3>
                                    <div class="price">₹${item.price}</div>
                                </div>
                            </div>
                        `;
                    }
                });

                // If no items are marked as available
                if (menuBox.innerHTML === '') {
                    statusMsg.style.display = 'block';
                    statusMsg.innerText = "Sorry, everything is currently out of stock!";
                }

            } catch (error) {
                statusMsg.innerText = "Failed to load data. Please check your internet or URL.";
                console.error("Error fetching data:", error);
            }
        }

        // Auto-load menu on page load
        window.onload = loadMenu;
    </script>
</body>
</html>
