<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glacier Ice Cream - Digital Menu</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@800&family=Poppins:wght@400;600;700&display=swap');

        :root {
            --primary-color: #e44d26;
            --glacier-blue: #2c3e50;
            --mother-dairy: #006eb5;
            --london-dairy: #b38b4d;
            --baskin-robbins: #ff0080;
            --bg-color: #fdfdfd;
        }

        body { font-family: 'Poppins', sans-serif; margin: 0; background-color: var(--bg-color); text-align: center; color: #333; position: relative; }
        
        /* =========================================
           ✨ NEW: BACKGROUND VECTORS & DESIGNER LINES
           ========================================= */
        .bg-graphics {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
            overflow: hidden; pointer-events: none;
            /* Subtle Designer Lines Pattern */
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23e44d26' fill-opacity='0.04'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
        }
        
        /* Modern Color Blobs (Glassmorphism effect) */
        .blob { position: absolute; filter: blur(90px); opacity: 0.25; border-radius: 50%; animation: float 10s ease-in-out infinite alternate; }
        .blob.pink { background: var(--baskin-robbins); width: 450px; height: 450px; top: -100px; left: -100px; }
        .blob.blue { background: var(--mother-dairy); width: 400px; height: 400px; bottom: 10%; right: -100px; animation-delay: 2s; }
        .blob.orange { background: var(--primary-color); width: 300px; height: 300px; top: 40%; left: 30%; opacity: 0.15; animation-delay: 4s; }

        @keyframes float { 0% { transform: translateY(0px) scale(1); } 100% { transform: translateY(30px) scale(1.1); } }

        /* Faded Ice Cream Vectors */
        .vector-icon { position: absolute; font-size: 8rem; opacity: 0.04; color: #000; user-select: none; }
        .icon1 { top: 15%; right: 10%; transform: rotate(15deg); }
        .icon2 { top: 45%; left: 5%; transform: rotate(-20deg); font-size: 10rem; }
        .icon3 { bottom: 15%; right: 25%; transform: rotate(25deg); }
        .icon4 { bottom: 5%; left: 15%; transform: rotate(-10deg); font-size: 6rem; }
        /* ========================================= */

        #loading-bar { position: fixed; top: 0; left: 0; height: 5px; background-color: var(--primary-color); width: 0%; z-index: 9999; transition: width 0.4s ease, opacity 0.5s ease; box-shadow: 0 2px 5px rgba(228, 77, 38, 0.5); }

        /* Glassmorphism Header */
        header { 
            background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            padding: 40px 10px; border-bottom: 5px solid var(--primary-color); box-shadow: 0 10px 30px rgba(0,0,0,0.04); 
            position: relative; z-index: 10;
        }
        header h1 { margin: 0; font-family: 'Montserrat', sans-serif; font-size: 3em; color: var(--glacier-blue); text-transform: uppercase; letter-spacing: 2px; text-shadow: 2px 2px 0px rgba(0,0,0,0.05); }
        header p { margin: 8px 0 0; color: #666; font-size: 1.1em; font-weight: 600; letter-spacing: 1px; }

        .filter-container { margin: 25px 0 10px; display: flex; justify-content: center; flex-wrap: wrap; gap: 12px; padding: 0 20px; position: relative; z-index: 10; }
        .filter-btn { padding: 10px 20px; border: 1px solid rgba(0,0,0,0.1); background: rgba(255,255,255,0.9); color: #444; border-radius: 50px; cursor: pointer; font-weight: 600; transition: all 0.3s ease; box-shadow: 0 4px 10px rgba(0,0,0,0.03); font-size: 0.9em; backdrop-filter: blur(5px); }
        .filter-btn:hover { transform: translateY(-3px); box-shadow: 0 6px 15px rgba(0,0,0,0.08); }
        .brand-btn.active { background: var(--glacier-blue); color: white; border-color: var(--glacier-blue); }
        .category-btn.active { background: var(--primary-color); color: white; border-color: var(--primary-color); }

        .search-sort-container { display: flex; justify-content: center; align-items: center; gap: 15px; margin-bottom: 40px; padding: 0 20px; flex-wrap: wrap; margin-top: 20px; position: relative; z-index: 10; }
        .search-input, .sort-select { padding: 12px 20px; border: 1px solid rgba(0,0,0,0.1); background: rgba(255,255,255,0.9); border-radius: 50px; font-size: 1em; outline: none; transition: all 0.3s; box-shadow: 0 4px 10px rgba(0,0,0,0.02); }
        .search-input { width: 250px; }
        .search-input:focus, .sort-select:focus { border-color: var(--primary-color); box-shadow: 0 4px 15px rgba(228, 77, 38, 0.15); }

        .pdf-btn { padding: 12px 25px; border: none; border-radius: 50px; background: #8e44ad; color: white; font-size: 1em; font-weight: bold; cursor: pointer; box-shadow: 0 6px 15px rgba(142, 68, 173, 0.2); transition: 0.3s; }
        .pdf-btn:hover { background: #9b59b6; transform: translateY(-3px); box-shadow: 0 8px 20px rgba(142, 68, 173, 0.3); }

        .menu-wrapper { padding-bottom: 100px; position: relative; z-index: 10; }
        .category-section { margin-bottom: 60px; }
        .category-title { font-family: 'Montserrat', sans-serif; font-size: 2.2em; color: var(--glacier-blue); text-transform: uppercase; border-bottom: 3px solid var(--primary-color); display: inline-block; padding-bottom: 5px; margin: 20px 0 30px 0; letter-spacing: 1px; }
        
        .menu-container { display: flex; flex-wrap: wrap; justify-content: center; padding: 10px; gap: 30px; }
        
        /* Glassmorphism Cards */
        .menu-card { 
            background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border-radius: 20px; width: 300px; box-shadow: 0 10px 30px rgba(0,0,0,0.06); 
            overflow: hidden; transition: all 0.4s ease; display: flex; flex-direction: column; border: 1px solid rgba(255,255,255,0.5); 
        }
        .menu-card:hover { transform: translateY(-10px); box-shadow: 0 20px 40px rgba(0,0,0,0.12); border-color: rgba(228, 77, 38, 0.2); }
        .menu-card img { width: 100%; height: 220px; object-fit: contain; background: #fff; padding: 20px; box-sizing: border-box; border-bottom: 1px solid rgba(0,0,0,0.03); }
        
        .info { padding: 20px; text-align: left; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .brand-badge { display: inline-block; padding: 5px 14px; border-radius: 20px; font-size: 0.7em; font-weight: 800; color: white; margin-bottom: 12px; text-transform: uppercase; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .badge-mother-dairy { background: var(--mother-dairy); }
        .badge-london-dairy { background: var(--london-dairy); }
        .badge-baskin-robbins { background: var(--baskin-robbins); }
        .badge-default { background: #555; }

        .item-name { font-size: 1.25em; font-weight: 700; color: #222; margin: 0; line-height: 1.3; min-height: 45px;}
        .price-cart-row { display: flex; justify-content: space-between; align-items: center; margin-top: 15px; }
        .price { color: var(--primary-color); font-weight: 800; font-size: 1.6em; }
        .add-btn { background: var(--glacier-blue); color: white; border: none; padding: 8px 18px; border-radius: 20px; font-weight: 600; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 10px rgba(44, 62, 80, 0.2); }
        .add-btn:hover { background: var(--primary-color); box-shadow: 0 6px 15px rgba(228, 77, 38, 0.3); transform: translateY(-2px); }
        
        #status-msg { margin-top: 60px; font-weight: 500; color: #888; font-size: 1.3em; position: relative; z-index: 10; }

        /* CART STYLES */
        #floating-cart { position: fixed; bottom: 30px; right: 30px; background: var(--primary-color); color: white; padding: 15px 25px; border-radius: 50px; font-size: 1.2em; font-weight: bold; cursor: pointer; box-shadow: 0 10px 25px rgba(228, 77, 38, 0.4); border: none; z-index: 1000; transition: 0.3s; }
        #floating-cart:hover { transform: scale(1.05) translateY(-5px); }
        #cart-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); backdrop-filter: blur(5px); z-index: 1001; justify-content: center; align-items: center; }
        .cart-content { background: white; padding: 30px; border-radius: 20px; width: 95%; max-width: 450px; max-height: 85vh; overflow-y: auto; text-align: left; position: relative; box-shadow: 0 20px 50px rgba(0,0,0,0.2); }
        .cart-content h2 { margin-top: 0; border-bottom: 2px solid #eee; padding-bottom: 10px; color: var(--glacier-blue); }
        .cart-item { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; font-weight: 500; border-bottom: 1px dashed #eee; padding-bottom: 15px; }
        .cart-item-details { flex: 2; }
        .cart-item-controls { flex: 1; display: flex; justify-content: center; align-items: center; gap: 10px; }
        .cart-item-price { flex: 1; text-align: right; color: var(--primary-color); }
        .qty-btn { background: #f0f0f0; border: none; width: 28px; height: 28px; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 1.1em; color: #333; transition: 0.2s; }
        .qty-btn:hover { background: var(--primary-color); color: white; }
        .cart-total { font-size: 1.5em; font-weight: bold; color: var(--glacier-blue); text-align: right; margin-top: 20px; }
        .checkout-btn { width: 100%; padding: 14px; border: none; border-radius: 10px; font-size: 1.1em; font-weight: bold; color: white; cursor: pointer; margin-top: 15px; transition: 0.3s; }
        .checkout-btn:hover { transform: translateY(-2px); }
        .btn-wa { background: #25D366; box-shadow: 0 4px 10px rgba(37, 211, 102, 0.3); } .btn-print { background: var(--glacier-blue); box-shadow: 0 4px 10px rgba(44, 62, 80, 0.3); } .btn-clear { background: #ff9f43; color: white; } .close-cart { background: #ff4757; }

        /* --- PDF & PRINT LAYOUT MAGIC (ULTRA COMPACT DESIGN) --- */
        @media print {
            @page { margin: 5mm; size: A4 portrait; }
            body { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; background: #fff !important; }
            
            /* Hide Background Graphics during Print to save ink and look professional */
            .bg-graphics, #loading-bar, #brand-filter-box, #category-filter-box, .search-sort-container, #floating-cart, .add-btn, #status-msg, .qty-btn { display: none !important; }

            body.print-menu header { box-shadow: none !important; border-bottom: 2px solid var(--primary-color) !important; padding: 0 0 5px 0 !important; text-align: center !important; margin-bottom: 10px !important; background: none !important; backdrop-filter: none !important; }
            body.print-menu header h1 { font-size: 20pt !important; margin: 0 !important; color: var(--glacier-blue) !important; text-shadow: none !important; }
            body.print-menu header p { font-size: 9pt !important; margin: 2px 0 0 !important; }
            
            body.print-menu .category-section { margin-bottom: 10px !important; page-break-inside: avoid !important; clear: both !important; }
            body.print-menu .category-title { font-size: 14pt !important; margin: 5px 0 10px 0 !important; padding-bottom: 2px !important; border-bottom: 2px solid var(--primary-color) !important; color: var(--glacier-blue) !important; display: block !important; }
            
            body.print-menu .menu-container { display: flex !important; flex-wrap: wrap !important; justify-content: flex-start !important; gap: 0 !important; padding: 0 !important; }
            
            body.print-menu .menu-card { 
                width: 23% !important; margin: 0 1% 10px 1% !important; box-shadow: none !important; 
                border: 1px solid #ddd !important; border-radius: 6px !important; background: #fff !important; 
                box-sizing: border-box !important; page-break-inside: avoid !important; 
                display: flex !important; flex-direction: column !important; backdrop-filter: none !important;
            }
            body.print-menu .menu-card img { height: 80px !important; padding: 4px !important; border-bottom: none !important; width: 100% !important; object-fit: contain !important; }
            
            body.print-menu .info { padding: 4px 4px 6px 4px !important; display: flex !important; flex-direction: column !important; justify-content: flex-start !important; align-items: center !important; flex-grow: 1 !important; }
            body.print-menu .brand-badge { font-size: 5.5pt !important; padding: 2px 4px !important; margin: 0 0 3px 0 !important; box-shadow: none !important; }
            body.print-menu .item-name { font-size: 8.5pt !important; line-height: 1.1 !important; margin: 0 0 3px 0 !important; min-height: 0 !important; text-align: center !important; width: 100% !important; }
            body.print-menu .price-cart-row { margin: 0 !important; padding: 0 !important; display: block !important; text-align: center !important; }
            body.print-menu .price { font-size: 11pt !important; margin: 0 !important; line-height: 1 !important; display: inline-block !important; }

            body.print-cart header, body.print-cart .menu-wrapper { display: none !important; }
            body.print-cart #cart-modal { display: block !important; position: static !important; background: none !important; backdrop-filter: none !important; }
            body.print-cart .cart-content { width: 100% !important; box-shadow: none !important; max-width: none !important; padding: 0 !important; }
            body.print-cart .checkout-btn { display: none !important; }
        }

        @media (max-width: 600px) {
            header h1 { font-size: 2em; }
            .search-input, .sort-select { width: 100%; } .pdf-btn { width: 100%; }
            #floating-cart { bottom: 20px; right: 20px; font-size: 1em; padding: 12px 20px; }
            /* Hide blobs on mobile to keep it fast and clean */
            .blob { display: none; }
        }
    </style>
</head>
<body>

    <div class="bg-graphics">
        <div class="blob pink"></div>
        <div class="blob blue"></div>
        <div class="blob orange"></div>
        <div class="vector-icon icon1">🍦</div>
        <div class="vector-icon icon2">🍨</div>
        <div class="vector-icon icon3">🍧</div>
        <div class="vector-icon icon4">🍦</div>
    </div>

    <div id="loading-bar"></div>

    <header>
        <h1>Glacier Ice Cream</h1>
        <p>Premium Brands • Fresh Flavors • Live Inventory</p>
    </header>

    <div class="filter-container" id="brand-filter-box">
        <button class="filter-btn brand-btn active" onclick="setBrand('All', this)">All Brands</button>
    </div>

    <div class="filter-container" id="category-filter-box" style="margin-top: -10px;">
        <button class="filter-btn category-btn active" id="btn-cat-all" onclick="setCategory('All', this)">All Categories</button>
    </div>

    <div class="search-sort-container">
        <input type="text" id="search-bar" class="search-input" placeholder="🔍 Search flavors..." onkeyup="applyFilters()">
        
        <select id="sort-dropdown" class="sort-select" onchange="applyFilters()">
            <option value="default">↕️ Sort Options</option>
            <option value="low-high">Price: Low to High</option>
            <option value="high-low">Price: High to Low</option>
            <option value="vol-low-high">Volume: Small to Large</option>
            <option value="vol-high-low">Volume: Large to Small</option>
        </select>
        
        <button class="pdf-btn" onclick="downloadMenuPDF()">📄 Export PDF Menu</button>
    </div>

    <div id="status-msg">Stocking our freezer... Please wait!</div>
    
    <div class="menu-wrapper" id="menu-wrapper"></div>

    <button id="floating-cart" onclick="toggleCart()">🛒 Cart (<span id="cart-count">0</span>)</button>

    <div id="cart-modal">
        <div class="cart-content">
            <h2>Your Order</h2>
            <div id="cart-items-list"></div>
            <div class="cart-total">Total: ₹<span id="cart-total-price">0</span></div>
            <button id="checkout-wa" class="checkout-btn btn-wa" onclick="checkout('whatsapp')">📱 Order on WhatsApp</button>
            <button id="checkout-print" class="checkout-btn btn-print" onclick="checkout('print')">🖨️ Print Bill</button>
            <button class="checkout-btn btn-clear" onclick="clearCart()">🗑️ Clear Cart</button>
            <button class="checkout-btn close-cart" onclick="toggleCart()">❌ Close</button>
        </div>
    </div>

    <script>
        const googleSheetUrl = "https://script.google.com/macros/s/AKfycbyZ6aCMNqwXN2CuSbcIDWDSkbgQ3ZMW6EVfux8fMVkApWpDVREnkKdtWrKj0YgSBSw/exec"; 
        const WHATSAPP_NUMBER = "919829610570"; 
        
        let allItems = [];
        let currentBrand = 'All';
        let selectedCategories = []; 
        let cart = {}; 

        async function loadData() {
            const statusMsg = document.getElementById('status-msg');
            const loadingBar = document.getElementById('loading-bar');
            loadingBar.style.width = '30%'; 

            try {
                const response = await fetch(googleSheetUrl);
                loadingBar.style.width = '70%'; 
                allItems = await response.json();
                
                if(!allItems || allItems.length === 0) {
                    statusMsg.innerText = "No items found in the menu.";
                    loadingBar.style.width = '100%';
                    loadingBar.style.backgroundColor = '#ff4757'; 
                    return;
                }
                
                createFilterButtons();
                applyFilters();
                setupSmartCheckout(); 

                loadingBar.style.width = '100%';
                setTimeout(() => { loadingBar.style.opacity = '0'; }, 500);
            } catch (error) {
                statusMsg.innerText = "Error fetching data. Check internet or Web App URL.";
                loadingBar.style.width = '100%';
                loadingBar.style.backgroundColor = '#ff4757'; 
            }
        }

        function createFilterButtons() {
            const brandBox = document.getElementById('brand-filter-box');
            const brands = [...new Set(allItems.map(item => item.brand).filter(b => b))];
            brands.forEach(brand => {
                const btn = document.createElement('button');
                btn.className = 'filter-btn brand-btn';
                btn.innerText = brand;
                btn.onclick = (e) => setBrand(brand, e.target);
                brandBox.appendChild(btn);
            });

            const categoryBox = document.getElementById('category-filter-box');
            const categories = [...new Set(allItems.map(item => item.category || 'More Favorites').filter(c => c))];
            categories.forEach(category => {
                const btn = document.createElement('button');
                btn.className = 'filter-btn category-btn';
                btn.innerText = category;
                btn.onclick = (e) => setCategory(category, e.target);
                categoryBox.appendChild(btn);
            });
        }

        function setBrand(brand, btnElement) {
            document.querySelectorAll('.brand-btn').forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active');
            currentBrand = brand;
            applyFilters();
        }

        function setCategory(category, btnElement) {
            const allBtn = document.getElementById('btn-cat-all');
            if (category === 'All') {
                selectedCategories = [];
                document.querySelectorAll('.category-btn').forEach(btn => btn.classList.remove('active'));
                allBtn.classList.add('active');
            } else {
                allBtn.classList.remove('active');
                const index = selectedCategories.indexOf(category);
                if (index > -1) {
                    selectedCategories.splice(index, 1);
                    btnElement.classList.remove('active');
                } else {
                    selectedCategories.push(category);
                    btnElement.classList.add('active');
                }
                if (selectedCategories.length === 0) {
                    allBtn.classList.add('active');
                }
            }
            applyFilters();
        }

        function getVolume(name) {
            let total = 0;
            const regex = /(\d+)\s*(ml|l|ltr|gm|g|kg)/gi;
            let match;
            while ((match = regex.exec(name)) !== null) {
                let val = parseFloat(match[1]);
                let unit = match[2].toLowerCase();
                if (unit === 'l' || unit === 'ltr' || unit === 'kg') val *= 1000;
                total += val;
            }
            return total;
        }

        function applyFilters() {
            const menuWrapper = document.getElementById('menu-wrapper');
            const statusMsg = document.getElementById('status-msg');
            const searchTerm = document.getElementById('search-bar').value.toLowerCase();
            const sortValue = document.getElementById('sort-dropdown').value;

            let filteredItems = allItems.filter(item => {
                const isAvailable = String(item.available).toLowerCase() === 'yes' || item.available === true;
                const matchesBrand = (currentBrand === 'All' || item.brand === currentBrand);
                const itemCat = item.category || 'More Favorites';
                const matchesCategory = (selectedCategories.length === 0 || selectedCategories.includes(itemCat));
                const matchesSearch = item.name.toLowerCase().includes(searchTerm);
                
                return isAvailable && matchesBrand && matchesCategory && matchesSearch;
            });

            if (sortValue === 'low-high') {
                filteredItems.sort((a, b) => a.price - b.price);
            } else if (sortValue === 'high-low') {
                filteredItems.sort((a, b) => b.price - a.price);
            } else if (sortValue === 'vol-low-high') {
                filteredItems.sort((a, b) => getVolume(a.name) - getVolume(b.name));
            } else if (sortValue === 'vol-high-low') {
                filteredItems.sort((a, b) => getVolume(b.name) - getVolume(a.name));
            }

            if (filteredItems.length === 0) {
                statusMsg.style.display = 'block';
                statusMsg.innerText = "No ice creams found matching your filters.";
                menuWrapper.innerHTML = '';
                return;
            }

            statusMsg.style.display = 'none';

            const groupedItems = {};
            filteredItems.forEach(item => {
                const cat = item.category || 'More Favorites';
                if (!groupedItems[cat]) groupedItems[cat] = [];
                groupedItems[cat].push(item);
            });

            let newHTML = '';
            for (const [category, items] of Object.entries(groupedItems)) {
                newHTML += `
                    <div class="category-section">
                        <h2 class="category-title">${category}</h2>
                        <div class="menu-container">
                `;
                
                items.forEach(item => {
                    let badgeClass = 'badge-default';
                    const b = String(item.brand).toLowerCase();
                    if(b.includes('mother')) badgeClass = 'badge-mother-dairy';
                    else if(b.includes('london')) badgeClass = 'badge-london-dairy';
                    else if(b.includes('baskin')) badgeClass = 'badge-baskin-robbins';

                    newHTML += `
                        <div class="menu-card">
                            <img src="${item.img}" referrerpolicy="no-referrer" loading="lazy" onerror="this.src='https://via.placeholder.com/300x220?text=Glacier+Ice+Cream'">
                            <div class="info">
                                <div>
                                    <span class="brand-badge ${badgeClass}">${item.brand}</span>
                                    <h3 class="item-name">${item.name}</h3>
                                </div>
                                <div class="price-cart-row">
                                    <span class="price">₹${item.price}</span>
                                    <button class="add-btn" onclick="addToCart('${item.name.replace(/'/g, "\\'")}', ${item.price}, '${item.brand.replace(/'/g, "\\'")}')">Add +</button>
                                </div>
                            </div>
                        </div>
                    `;
                });
                newHTML += `</div></div>`;
            }
            menuWrapper.innerHTML = newHTML;
        }

        function addToCart(name, price, brand) {
            if(cart[name]) { cart[name].qty += 1; } 
            else { cart[name] = { price: price, qty: 1, brand: brand }; }
            updateCartUI();
            const floatBtn = document.getElementById('floating-cart');
            floatBtn.style.transform = 'scale(1.2) translateY(-5px)';
            setTimeout(() => floatBtn.style.transform = 'scale(1) translateY(0)', 200);
        }

        function changeQty(name, delta) {
            if(cart[name]) {
                cart[name].qty += delta;
                if(cart[name].qty <= 0) delete cart[name];
                updateCartUI();
            }
        }

        function updateCartUI() {
            const cartList = document.getElementById('cart-items-list');
            let totalQty = 0; let totalPrice = 0;
            cartList.innerHTML = '';
            for (const [name, data] of Object.entries(cart)) {
                totalQty += data.qty;
                const itemTotal = data.price * data.qty;
                totalPrice += itemTotal;
                cartList.innerHTML += `
                    <div class="cart-item">
                        <div class="cart-item-details">
                            <div style="font-size: 0.75em; color: var(--glacier-blue); font-weight: 700; text-transform: uppercase;">${data.brand}</div>
                            <div>${name}</div>
                        </div>
                        <div class="cart-item-controls">
                            <button class="qty-btn" onclick="changeQty('${name.replace(/'/g, "\\'")}', -1)">-</button>
                            <span>${data.qty}</span>
                            <button class="qty-btn" onclick="changeQty('${name.replace(/'/g, "\\'")}', 1)">+</button>
                        </div>
                        <div class="cart-item-price">₹${itemTotal}</div>
                    </div>
                `;
            }
            if(totalQty === 0) cartList.innerHTML = '<p style="color:#888; text-align: center;">Your cart is empty. 🍦</p>';
            document.getElementById('cart-count').innerText = totalQty;
            document.getElementById('cart-total-price').innerText = totalPrice;
        }

        function toggleCart() {
            const modal = document.getElementById('cart-modal');
            modal.style.display = modal.style.display === 'flex' ? 'none' : 'flex';
        }

        function clearCart() {
            if(Object.keys(cart).length === 0) return;
            if(confirm("Are you sure you want to clear your cart?")) { cart = {}; updateCartUI(); }
        }

        function setupSmartCheckout() {
            const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
            if(isMobile) document.getElementById('checkout-print').style.display = 'none';
            else document.getElementById('checkout-wa').style.display = 'none';
        }

        window.addEventListener('afterprint', () => { document.body.className = ''; });

        function downloadMenuPDF() {
            document.body.className = 'print-menu';
            document.body.offsetHeight; 
            setTimeout(() => { window.print(); }, 500);
        }

        function checkout(method) {
            if(Object.keys(cart).length === 0) { alert("Please add some items to your cart first!"); return; }
            
            if(method === 'print') {
                document.body.className = 'print-cart';
                document.body.offsetHeight; 
                setTimeout(() => { window.print(); }, 500);
            } 
            else if (method === 'whatsapp') {
                let message = "Hello Glacier Ice Cream!🍦\n\n*New Order:*\n";
                let total = 0;
                for (const [name, data] of Object.entries(cart)) {
                    message += `- ${data.qty}x [${data.brand}] ${name} (₹${data.price * data.qty})\n`;
                    total += (data.price * data.qty);
                }
                message += `\n*Total Amount: ₹${total}*\n\n_Please confirm my order._`;
                const finalEncodedMessage = encodeURIComponent(message);
                window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${finalEncodedMessage}`, '_blank');
            }
        }

        window.onload = loadData;
    </script>
</body>
</html>
