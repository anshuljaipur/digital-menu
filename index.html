<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glacier Ice Cream - Digital Menu</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@800&family=Poppins:wght@400;600;700&display=swap');

        :root {
            --primary-color: #e44d26;
            --glacier-blue: #2c3e50;
            --mother-dairy: #006eb5;
            --london-dairy: #b38b4d;
            --baskin-robbins: #ff0080; /* BR Signature Pink */
            --bg-color: #f4f7f6;
        }

        body { font-family: 'Poppins', sans-serif; margin: 0; background-color: var(--bg-color); text-align: center; color: #333; }
        
        /* Stylish Header for Glacier */
        header { 
            background: #fff; 
            padding: 40px 10px; 
            border-bottom: 6px solid var(--primary-color);
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            position: relative;
        }
        header h1 { 
            margin: 0; 
            font-family: 'Montserrat', sans-serif;
            font-size: 2.8em; 
            color: var(--glacier-blue); 
            text-transform: uppercase; 
            letter-spacing: 2px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.05);
        }
        header p { 
            margin: 8px 0 0; 
            color: #777; 
            font-size: 1.1em;
            font-weight: 500;
            letter-spacing: 1px;
        }

        /* Premium Filters Styling */
        .filter-container { margin: 30px 0; display: flex; justify-content: center; flex-wrap: wrap; gap: 15px; padding: 0 20px; }
        .filter-btn { 
            padding: 14px 28px; border: 1px solid #ddd; background: #fff; color: #444; 
            border-radius: 50px; cursor: pointer; font-weight: 600; 
            box-shadow: 0 3px 8px rgba(0,0,0,0.05); transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .filter-btn:hover { transform: translateY(-3px); box-shadow: 0 6px 15px rgba(0,0,0,0.1); }
        .filter-btn.active { background: var(--glacier-blue); color: white; border-color: var(--glacier-blue); }

        /* Card Layout */
        .menu-container { display: flex; flex-wrap: wrap; justify-content: center; padding: 10px; gap: 30px; min-height: 200px; }
        
        .menu-card { 
            background: white; border-radius: 20px; width: 300px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); overflow: hidden; 
            transition: all 0.4s ease; border: 1px solid rgba(0,0,0,0.02);
            display: flex; flex-direction: column;
        }
        .menu-card:hover { transform: translateY(-12px); box-shadow: 0 20px 40px rgba(0,0,0,0.12); }
        
        /* Professional Image Fitting */
        .menu-card img { 
            width: 100%; 
            height: 220px; 
            object-fit: contain; /* FITS WHOLE IMAGE WITHOUT CROPPING */
            background: #fff; 
            padding: 20px; 
            box-sizing: border-box;
            border-bottom: 1px solid #f8f8f8;
        }
        
        .info { padding: 20px; text-align: left; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; }
        
        .brand-badge { 
            display: inline-block; padding: 5px 14px; border-radius: 20px; 
            font-size: 0.7em; font-weight: 800; color: white; margin-bottom: 12px;
            text-transform: uppercase; letter-spacing: 0.5px;
        }
        
        /* Badge Colors */
        .badge-mother-dairy { background: var(--mother-dairy); }
        .badge-london-dairy { background: var(--london-dairy); }
        .badge-baskin-robbins { background: var(--baskin-robbins); }
        .badge-default { background: #555; }

        .item-name { font-size: 1.25em; font-weight: 700; color: #222; margin: 0; line-height: 1.3; }
        .price { color: var(--primary-color); font-weight: 800; font-size: 1.6em; margin-top: 15px; display: block; }
        
        #status-msg { margin-top: 60px; font-weight: 500; color: #888; font-size: 1.3em; }

        /* Mobile Friendly Adjustments */
        @media (max-width: 600px) {
            header h1 { font-size: 2em; }
            .menu-card { width: 90%; }
        }
    </style>
</head>
<body>

    <header>
        <h1>Glacier Ice Cream</h1>
        <p>Premium Brands • Fresh Flavors • Live Inventory</p>
    </header>

    <div class="filter-container" id="filter-box">
        <button class="filter-btn active" onclick="filterMenu('All', this)">All Brands</button>
    </div>

    <div id="status-msg">Stocking our freezer... Please wait!</div>
    <div class="menu-container" id="menu-box"></div>

    <script>
        // Your Verified Apps Script URL
        const googleSheetUrl = "https://script.google.com/macros/s/AKfycbwS8NLxa9SP6KP0IFqUyzMztpcO6q0BzvtDXA0_MasxkeKPPKSbUK8O0iEQdHDZXIE/exec"; 
        let allItems = [];

        async function loadData() {
            const statusMsg = document.getElementById('status-msg');
            try {
                const response = await fetch(googleSheetUrl);
                allItems = await response.json();
                
                if(!allItems || allItems.length === 0) {
                    statusMsg.innerText = "No items found in the menu.";
                    return;
                }

                createFilterButtons();
                renderMenu('All');
            } catch (error) {
                statusMsg.innerText = "Error fetching data. Check internet.";
                console.error(error);
            }
        }

        function createFilterButtons() {
            const filterBox = document.getElementById('filter-box');
            const brands = [...new Set(allItems.map(item => item.brand).filter(b => b))];
            
            brands.forEach(brand => {
                const btn = document.createElement('button');
                btn.className = 'filter-btn';
                btn.innerText = brand;
                btn.onclick = (e) => filterMenu(brand, e.target);
                filterBox.appendChild(btn);
            });
        }

        function filterMenu(brand, btnElement) {
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active');
            renderMenu(brand);
        }

        function renderMenu(filter) {
            const menuBox = document.getElementById('menu-box');
            const statusMsg = document.getElementById('status-msg');
            menuBox.innerHTML = '';
            statusMsg.style.display = 'none';

            const filteredItems = allItems.filter(item => {
                const isAvailable = String(item.available).toLowerCase() === 'yes' || item.available === true;
                return isAvailable && (filter === 'All' || item.brand === filter);
            });

            if (filteredItems.length === 0) {
                statusMsg.style.display = 'block';
                statusMsg.innerText = "Sorry, this selection is currently out of stock!";
                return;
            }

            filteredItems.forEach(item => {
                let badgeClass = 'badge-default';
                const b = String(item.brand).toLowerCase();
                if(b.includes('mother')) badgeClass = 'badge-mother-dairy';
                else if(b.includes('london')) badgeClass = 'badge-london-dairy';
                else if(b.includes('baskin')) badgeClass = 'badge-baskin-robbins';

                menuBox.innerHTML += `
                    <div class="menu-card">
                        <img 
                            src="${item.img}" 
                            referrerpolicy="no-referrer" 
                            alt="${item.name}" 
                            onerror="this.src='https://via.placeholder.com/300x220?text=Ice+Cream'">
                        <div class="info">
                            <div>
                                <span class="brand-badge ${badgeClass}">${item.brand}</span>
                                <h3 class="item-name">${item.name}</h3>
                            </div>
                            <span class="price">₹${item.price}</span>
                        </div>
                    </div>
                `;
            });
        }

        window.onload = loadData;
    </script>
</body>
</html>
